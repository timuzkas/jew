quotes:
  - "Shema Yisrael, Adonai Eloheinu, Adonai Echad. — Hear, O Israel, the LORD our God, the LORD is one."
  - "V'ahavta et Adonai Elohecha b'chol l'vavcha, u'v'chol nafshcha, u'v'chol m'odecha. — You shall love the LORD your God with all your heart, with all your soul, and with all your might."
  - "Tzedek, tzedek tirdof — Justice, justice shall you pursue."
  - "Lo yivaleh l'ochel yisrael min habasar — No person from Israel shall eat blood."
  - "Zachor et yom haShabbat l'kadsho — Remember the Sabbath day to keep it holy."
  - "Kol Yisrael areivim zeh lazeh — All Israel is responsible for one another."
  - "B'tzelem Elohim — In the image of God."
  - "Tikun Olam — Repairing the world."
  - "Derech Eretz — The way of the land."
  - "L'dor v'dor — From generation to generation."
  - "Am Yisrael Chai — The people of Israel live."
  - "Chamishi, Shishi, Shabat — Fifth, Sixth, Sabbath."
  - "Eilu v'eilu divrei Elohim chaim — These and those are words of the living God."
  - "Hinei ma tov u'ma naim — Behold, how good and how pleasant it is."
  - "Yom shekulo shabbat — A day that is entirely Sabbath."
